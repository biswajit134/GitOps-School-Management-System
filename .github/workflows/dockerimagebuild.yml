name:  build docker image and push to dockerhub
on:
    push:
        branches:
            - main
            - devops
        paths-ignore:
            - README.md
            # - .github/workflows/dockerimagebuild.yml
    workflow_dispatch:
        
        
jobs:
    compile:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v2
        - run: echo "Checked out code successful"


        - name: Set up node js
          uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Frontend Compilation (syntax check)
          run: |
            cd frontend
            find . -name "*.js" -exec node --check {} +

        - name: Backend Compilation (syntax check)
          run: |
            cd backend
            find . -name "*.js" -exec node --check {} +
    
    gitleaks-scan:
      runs-on: ubuntu-latest
      needs: compile
      steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Gitleaks Setup
            uses: gitleaks/gitleaks-action@v2

          - name: Gitleaks Scan
            run: |
              gitleaks detect --source ./frontend
              gitleaks detect --source ./backend

    trivy_fs_scan:
      runs-on: ubuntu-latest
      needs: gitleaks-scan
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (FS)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH






    build:
        runs-on: ubuntu-latest
        needs: trivy_fs_scan
        steps:
            - name: Checkout code
              uses: actions/checkout@v2
            - run: echo "Checked out code successful"

            - name: Log in to Docker Hub
              uses: docker/login-action@v1
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}


            - name: docker build images
              run: |
                docker build -t biswajit134/sms_frontend:latest ./frontend
                docker build -t biswajit134/sms_backend:latest ./backend
                echo "Docker images built successfully"
              
            - name: Push images to Docker Hub
              run: |
                docker push biswajit134/sms_frontend:latest
                docker push biswajit134/sms_backend:latest
                echo "Docker images pushed to Docker Hub successfully"
    

    trivy_image_scan:
      runs-on: ubuntu-latest
      needs:
        - build
      steps:
          - name: Checkout (noop, keeps workspace consistent)
            uses: actions/checkout@v4

          - name: Run Trivy image scan for backend
            uses: aquasecurity/trivy-action@0.28.0
            with:
              scan-type: image
              image-ref: biswajit134/sms_backend:latest
              format: table
              exit-code: '0'                 # set to '1' to fail on vulns
              ignore-unfixed: true
              vuln-type: os,library
              severity: CRITICAL,HIGH 
              
              
          - name: Run Trivy image scan for frontend
            uses: aquasecurity/trivy-action@0.28.0
            with:
              scan-type: image
              image-ref: biswajit134/sms_frontend:latest
              format: table
              exit-code: '0'                 # set to '1' to fail on vulns
              ignore-unfixed: true
              vuln-type: os,library
              severity: CRITICAL,HIGH   
              

